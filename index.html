<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Redes de Saúde</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f7f7f7;
        }
        .ifood-red {
            background-color: #EA1D2C;
        }
        .ifood-red-text {
            color: #EA1D2C;
        }
        .card-shadow {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        select:focus, input:focus {
            outline: none;
            border-color: #EA1D2C;
            ring: 1px;
            ring-color: #EA1D2C;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header / Logo Area -->
    <div class="mb-8 text-center">
        <div class="ifood-red text-white p-4 rounded-full inline-block mb-4 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-800">Busca de Rede Credenciada</h1>
        <p class="text-gray-500 mt-2">Encontre o atendimento ideal para o seu plano</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white w-full max-w-lg rounded-3xl p-8 card-shadow border border-gray-100">
        <form id="searchForm" class="space-y-6">
            
            <!-- Operadora -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Qual a operadora?</label>
                <select id="operadora" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 appearance-none cursor-pointer hover:bg-white transition-colors" required>
                    <option value="" disabled selected>Selecione a operadora</option>
                    <option value="Bradesco">Bradesco Saúde</option>
                    <option value="Unimed">Unimed</option>
                </select>
            </div>

            <!-- Plano -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Qual o plano?</label>
                <select id="plano" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 appearance-none cursor-pointer hover:bg-white transition-colors disabled:opacity-50" disabled required>
                    <option value="" disabled selected>Selecione a operadora primeiro</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Estado -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Estado</label>
                    <select id="estado" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 appearance-none cursor-pointer hover:bg-white transition-colors" required>
                        <option value="" disabled selected>Carregando...</option>
                    </select>
                </div>

                <!-- Cidade -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Cidade</label>
                    <select id="cidade" class="w-full
