<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Redes de Saúde</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f7f7f7;
        }
        .ifood-red {
            background-color: #EA1D2C;
        }
        .ifood-red-text {
            color: #EA1D2C;
        }
        .card-shadow {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        select:focus, input:focus {
            outline: none;
            border-color: #EA1D2C;
            ring: 1px;
            ring-color: #EA1D2C;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header / Logo Area -->
    <div class="mb-8 text-center">
        <div class="ifood-red text-white p-4 rounded-full inline-block mb-4 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-800">Comparador de Redes de Saúde</h1>
        <p class="text-gray-500 mt-2">Compare a rede credenciada dos planos Bradesco e Unimed</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white w-full max-w-2xl rounded-3xl p-8 card-shadow border border-gray-100">
        <form id="searchForm" class="space-y-6">
            
            <!-- Operadoras (Multipla Seleção) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Quais operadoras deseja comparar?</label>
                <div class="space-y-2">
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition-colors">
                        <input type="checkbox" id="op-bradesco" name="operadora" value="Bradesco" class="mr-3 h-5 w-5 text-red-600">
                        <span class="font-semibold">Bradesco Saúde</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition-colors">
                        <input type="checkbox" id="op-unimed" name="operadora" value="Unimed" class="mr-3 h-5 w-5 text-red-600">
                        <span class="font-semibold">Unimed CNU</span>
                    </label>
                </div>
            </div>

            <!-- Planos Bradesco (Condicional) -->
            <div id="planos-bradesco" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Qual plano Bradesco?</label>
                <select id="plano-bradesco" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 appearance-none cursor-pointer hover:bg-white transition-colors">
                    <option value="">Selecione o plano Bradesco</option>
                    <option value="Efetivo">Efetivo</option>
                    <option value="Ideal">Ideal</option>
                    <option value="Nacional">Nacional</option>
                    <option value="Nacional Plus">Nacional Plus</option>
                    <option value="Premium">Premium</option>
                </select>
            </div>

            <!-- Planos Unimed (Condicional) -->
            <div id="planos-unimed" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Qual plano Unimed?</label>
                <select id="plano-unimed" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 appearance-none cursor-pointer hover:bg-white transition-colors">
                    <option value="">Selecione o plano Unimed</option>
                    <option value="Estilo">Estilo</option>
                    <option value="Absoluto">Absoluto</option>
                    <option value="Superior">Superior</option>
                    <option value="Exclusivo">Exclusivo</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Estado -->
                <div>
