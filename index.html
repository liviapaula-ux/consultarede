<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Redes de Saúde</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f7f7f7;
        }
        .ifood-red {
            background-color: #EA1D2C;
        }
        .ifood-red-text {
            color: #EA1D2C;
        }
        .card-shadow {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        select:focus, input:focus {
            outline: none;
            border-color: #EA1D2C;
            ring: 1px;
            ring-color: #EA1D2C;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header / Logo Area -->
    <div class="mb-8 text-center">
        <div class="ifood-red text-white p-4 rounded-full inline-block mb-4 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-800">Busca de Rede Credenciada</h1>
        <p class="text-gray-500 mt-2">Encontre o atendimento ideal para o seu plano</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white w-full max-w-lg rounded-3xl p-8 card-shadow border border-gray-100">
        <form id="searchForm" class="space-y-6">
            
            <!-- Operadora -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Qual a operadora?</label>
                <select id="operadora" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 appearance-none cursor-pointer hover:bg-white transition-colors" required>
                    <option value="" disabled selected>Selecione a operadora</option>
                    <option value="Bradesco">Bradesco Saúde</option>
                    <option value="Unimed">Unimed</option>
                </select>
            </div>

            <!-- Plano -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Qual o plano?</label>
                <select id="plano" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 appearance-none cursor-pointer hover:bg-white transition-colors disabled:opacity-50" disabled required>
                    <option value="" disabled selected>Selecione a operadora primeiro</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Estado -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Estado</label>
                    <select id="estado" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 appearance-none cursor-pointer hover:bg-white transition-colors" required>
                        <option value="" disabled selected>Carregando...</option>
                    </select>
                </div>

                <!-- Cidade -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Cidade</label>
                    <select id="cidade" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 appearance-none cursor-pointer hover:bg-white transition-colors disabled:opacity-50" disabled required>
                        <option value="" disabled selected>Selecione o estado</option>
                    </select>
                </div>
            </div>

            <!-- Botão Pesquisar -->
            <button type="submit" class="w-full ifood-red text-white font-bold py-4 rounded-xl shadow-lg hover:opacity-90 transition-all transform active:scale-95 flex items-center justify-center gap-2">
                <span>Pesquisar Agora</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
        </form>
    </div>

    <!-- Footer Information -->
    <p class="mt-8 text-sm text-gray-400">
        Integrado com Agente Inteligente Toqan.ai
    </p>

    <script>
        const operadoraSelect = document.getElementById('operadora');
        const planoSelect = document.getElementById('plano');
        const estadoSelect = document.getElementById('estado');
        const cidadeSelect = document.getElementById('cidade');
        const searchForm = document.getElementById('searchForm');

        const planosMap = {
            'Bradesco': ['Efetivo', 'Ideal', 'Nacional', 'Nacional Plus', 'Premium'],
            'Unimed': ['Estilo', 'Absoluto', 'Superior', 'Exclusivo']
        };

        // Lógica de Planos baseada na Operadora
        operadoraSelect.addEventListener('change', function() {
            const selected = this.value;
            planoSelect.disabled = false;
            planoSelect.innerHTML = '<option value="" disabled selected>Selecione o plano</option>';
            
            planosMap[selected].forEach(plano => {
                const opt = document.createElement('option');
                opt.value = plano;
                opt.textContent = plano;
                planoSelect.appendChild(opt);
            });
        });

        // Buscar Estados Brasileiros (API IBGE)
        async function fetchEstados() {
            try {
                const response = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome');
                const estados = await response.json();
                
                estadoSelect.innerHTML = '<option value="" disabled selected>Selecione</option>';
                estados.forEach(uf => {
                    const opt = document.createElement('option');
                    opt.value = uf.sigla;
                    opt.textContent = uf.nome;
                    estadoSelect.appendChild(opt);
                });
            } catch (error) {
                console.error('Erro ao carregar estados', error);
                estadoSelect.innerHTML = '<option value="" disabled selected>Erro ao carregar</option>';
            }
        }

        // Buscar Cidades baseadas no Estado (API IBGE)
        estadoSelect.addEventListener('change', async function() {
            const uf = this.value;
            cidadeSelect.disabled = true;
            cidadeSelect.innerHTML = '<option value="" disabled selected>Carregando cidades...</option>';

            try {
                const response = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios?orderBy=nome`);
                const cidades = await response.json();
                
                cidadeSelect.disabled = false;
                cidadeSelect.innerHTML = '<option value="" disabled selected>Selecione a cidade</option>';
                cidades.forEach(cidade => {
                    const opt = document.createElement('option');
                    opt.value = cidade.nome;
                    opt.textContent = cidade.nome;
                    cidadeSelect.appendChild(opt);
                });
            } catch (error) {
                console.error('Erro ao carregar cidades', error);
            }
        });

        // Ação de Pesquisa
        searchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                operadora: operadoraSelect.value,
                plano: planoSelect.value,
                estado: estadoSelect.options[estadoSelect.selectedIndex].text,
                cidade: cidadeSelect.value
            };

            // URL do Agente Toqan
            const agentBaseUrl = "https://work.toqan.ai/?spaceId=58f51626-d028-4d67-b175-ba2c2ff7d30e";
            
            // Como é um agente de chat, redirecionamos o usuário com os dados para ele iniciar a interação
            // Dica: Você pode informar ao usuário o que perguntar ou apenas abrir o link.
            const query = encodeURIComponent(`Olá! Gostaria de pesquisar a rede credenciada do plano ${data.plano} da ${data.operadora} em ${data.cidade} - ${data.estado}.`);
            
            // Se o agente suportar parâmetros de query, você pode tentar passá-los. 
            // Caso contrário, o redirecionamento simples é o padrão.
            window.open(agentBaseUrl, '_blank');
        });

        // Inicializar estados
        fetchEstados();
    </script>
<!-- Formulário Toqan -->
<div id="toqan-form" style="max-width: 600px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
  <h2>🏥 Consultar Planos de Saúde</h2>
  
  <textarea 
    id="mensagem" 
    placeholder="Ex: Preciso de um plano de saúde para minha família de 4 pessoas..." 
    rows="5" 
    style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;"
  ></textarea>
  
  <button 
    id="enviar" 
    style="width: 100%; padding: 12px; margin-top: 10px; background: #0070f3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;"
  >
    Enviar Consulta
  </button>
  
  <div id="loading" style="display: none; margin-top: 20px; text-align: center; color: #0070f3;">
    ⏳ Processando sua consulta...
  </div>
  
  <div id="resposta" style="margin-top: 20px; padding: 15px; background: #f0f9ff; border-left: 4px solid #0070f3; border-radius: 4px; display: none;">
    <h3 style="margin-top: 0;">✅ Resposta:</h3>
    <pre id="resposta-texto" style="white-space: pre-wrap; font-family: Arial; font-size: 14px;"></pre>
  </div>
  
  <div id="erro" style="margin-top: 20px; padding: 15px; background: #ffebee; border-left: 4px solid #f44336; border-radius: 4px; color: #c62828; display: none;">
    <h3 style="margin-top: 0;">❌ Erro:</h3>
    <p id="erro-texto"></p>
  </div>
</div>

<script>
// URL da sua função no Vercel
const API_URL = 'https://consultarede.vercel.app/api/toqan';

document.getElementById('enviar').addEventListener('click', async function() {
  // Pega a mensagem digitada
  const mensagem = document.getElementById('mensagem').value;
  
  // Valida se tem mensagem
  if (!mensagem.trim()) {
    alert('⚠️ Por favor, digite uma mensagem!');
    return;
  }
  
  // Esconde mensagens anteriores
  document.getElementById('resposta').style.display = 'none';
  document.getElementById('erro').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  
  // Desabilita o botão
  const botao = document.getElementById('enviar');
  botao.disabled = true;
  botao.style.opacity = '0.6';
  botao.style.cursor = 'not-allowed';
  
  try {
    // Envia para sua função no Vercel
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ message: mensagem })
    });
    
    const data = await response.json();
    
    // Esconde loading
    document.getElementById('loading').style.display = 'none';
    
    if (response.ok) {
      // Sucesso! Mostra a resposta
      document.getElementById('resposta-texto').textContent = JSON.stringify(data, null, 2);
      document.getElementById('resposta').style.display = 'block';
    } else {
      // Erro da API
      document.getElementById('erro-texto').textContent = data.error || 'Erro desconhecido';
      document.getElementById('erro').style.display = 'block';
    }
    
  } catch (error) {
    // Erro de conexão
    document.getElementById('loading').style.display = 'none';
    document.getElementById('erro-texto').textContent = 'Erro ao conectar: ' + error.message;
    document.getElementById('erro').style.display = 'block';
  }
  
  // Restaura o botão
  botao.disabled = false;
  botao.style.opacity = '1';
  botao.style.cursor = 'pointer';
});
</script>
</body>
</html>
